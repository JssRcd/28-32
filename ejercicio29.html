<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio #29 – Par o Impar</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }

    h1 { margin-bottom: 1rem; font-size: 1.4rem; }

    .form-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    input[type="number"] {
      padding: 0.5rem;
      font-size: 1rem;
      width: 140px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: #3a7bd5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover { background: #2c5faa; }

    #resultado {
      font-size: 1.1rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Números Pares e Impares</h1>

  <div class="form-group">
    <input type="number" id="numero" placeholder="Ej: 7" step="1" />
    <button id="btnVerificar">Verificar</button>
  </div>

  <p id="resultado"></p>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var input = document.getElementById("numero");
      var boton = document.getElementById("btnVerificar");
      var resultado = document.getElementById("resultado");

      function verificar() {
        var numero = parseInt(input.value);

        if (isNaN(numero)) {
          resultado.textContent = "Por favor ingresa un número válido.";
          return;
        }

        if (numero % 2 === 0) {
          resultado.textContent = "Par";
        } else {
          resultado.textContent = "Impar";
        }
      }

      boton.addEventListener("click", verificar);

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") verificar();
      });
    });
  </script>
</body>
</html>
